name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Cache selflare
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/node_modules/selflare
          key: selflare-${{ hashFiles('package-lock.json') }}
          restore-keys: selflare-

      - name: Install selflare (if not cached)
        run: |
          npm ls -g selflare 2>/dev/null || npm install -g selflare

      # selflare's default -d list only covers cache/kv/d1/r2. This worker
      # (wrangler.toml) only declares Durable Object bindings, so the only
      # storage directory that actually matters is do:storage. selflare
      # ignores -d mappings for bindings the worker doesn't use, so it's
      # safe to pass all five every time even as the worker evolves.
      - name: Compile worker to Cap'n Proto
        run: |
          selflare compile \
            -d cache:storage=./cache \
            -d kv:storage=./kv \
            -d d1:storage=./d1 \
            -d r2:storage=./r2 \
            -d do:storage=./do

      - name: Generate Dockerfile and docker-compose.yml
        run: selflare docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          load: true
          tags: yaos-server:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          mkdir -p .storage/{cache,kv,d1,r2,do}

          docker run -d --name yaos-smoke \
            -p 8080:8080 \
            -v "$(pwd)/.storage/cache:/worker/cache" \
            -v "$(pwd)/.storage/kv:/worker/kv" \
            -v "$(pwd)/.storage/d1:/worker/d1" \
            -v "$(pwd)/.storage/r2:/worker/r2" \
            -v "$(pwd)/.storage/do:/worker/do" \
            yaos-server:smoke-test

          echo "Waiting for worker to come up..."
          for i in $(seq 1 30); do
            if ! docker inspect yaos-smoke --format '{{.State.Running}}' | grep -q true; then
              echo "Container exited on attempt $i — showing logs:"
              docker logs yaos-smoke
              exit 1
            fi

            if curl -fsS http://localhost:8080/ -o /tmp/home.html 2>/dev/null; then
              echo "Worker responded on attempt $i"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "Worker never responded after 30 attempts"
              docker logs yaos-smoke
              exit 1
            fi
            sleep 1
          done

          echo "--- / response (first 20 lines) ---"
          head -20 /tmp/home.html

          echo "--- /api/capabilities ---"
          curl -fsS http://localhost:8080/api/capabilities | tee /tmp/capabilities.json
          echo

          node -e "JSON.parse(require('fs').readFileSync('/tmp/capabilities.json', 'utf8'))"

          echo "--- container logs ---"
          docker logs yaos-smoke

      - name: Tear down smoke test container
        if: always()
        run: docker rm -f yaos-smoke || true

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
