name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Typecheck
        run: |
          cd server
          npm run typecheck

      - name: Install selflare
        run: |
          cd server
          npm install -g selflare

      # selflare's default -d list only covers cache/kv/d1/r2. This worker
      # (wrangler.toml) only declares Durable Object bindings, so the only
      # storage directory that actually matters is do:storage. selflare
      # ignores -d mappings for bindings the worker doesn't use, so it's
      # safe to pass all five every time even as the worker evolves.
      - name: Compile worker to Cap'n Proto
        run: |
          cd server
          selflare compile \
            -d cache:storage=./cache \
            -d kv:storage=./kv \
            -d d1:storage=./d1 \
            -d r2:storage=./r2 \
            -d do:storage=./do

      - name: Generate Dockerfile and docker-compose.yml
        run: |
          cd server
          selflare docker

      # selflare docker always writes a fixed cache/kv/d1/r2 mount list and
      # never includes "do", regardless of what worker.capnp actually
      # declares — and it never drops a binding that genuinely isn't used
      # either. Instead of hardcoding which bindings this worker has (which
      # silently goes stale the moment a binding is added or removed), detect
      # the real list directly from the compiled worker.capnp and regenerate
      # the volumes section from it.
      - name: Patch docker-compose.yml from actual worker.capnp bindings
        run: |
          cd server

          BINDINGS=$(strings worker.capnp | grep -oE '^(cache|kv|d1|r2|do):storage$' | sort -u | sed -E 's/:storage$//')
          echo "Detected storage bindings:"
          echo "$BINDINGS"

          if [ -n "$BINDINGS" ]; then
            python3 - "$BINDINGS" <<'PYEOF'
          import sys

          names = [n for n in sys.argv[1].splitlines() if n.strip()]

          with open("docker-compose.yml") as f:
              lines = f.readlines()

          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if line.strip() == "volumes:":
                  indent = line[: len(line) - len(line.lstrip(" "))]
                  item_indent = indent + "    "
                  # Skip selflare's original volumes: line and its list items.
                  i += 1
                  while i < len(lines) and lines[i].startswith(item_indent + "-"):
                      i += 1
                  if names:
                      out.append(line)  # keep "volumes:"
                      for n in names:
                          out.append(f"{item_indent}- ./.storage/{n}:/worker/{n}\n")
                  # else: drop "volumes:" entirely — an empty list parses as
                  # null and docker compose rejects that.
                  continue
              out.append(line)
              i += 1

          with open("docker-compose.yml", "w") as f:
              f.writelines(out)
          PYEOF
          fi

          echo "--- final docker-compose.yml ---"
          cat docker-compose.yml

          # Export the same binding list for the smoke test step so the
          # docker run command mounts exactly these dirs.
          {
            echo "STORAGE_BINDINGS<<EOF"
            echo "$BINDINGS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # selflare docker only creates /worker/{cache,kv,d1,r2} dirs in the
      # Dockerfile. Add mkdir for all possible storage bindings — mkdir -p
      # is a no-op for dirs that already exist, so it's always safe.
      - name: Ensure storage dirs in Dockerfile
        run: |
          cd server
          sed -i '/^CMD\|^ENTRYPOINT/i RUN mkdir -p /worker/cache /worker/kv /worker/d1 /worker/r2 /worker/do' Dockerfile
          echo "--- final Dockerfile ---"
          cat Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          load: true
          tags: yaos-server:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          cd server

          MOUNT_ARGS=()
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            mkdir -p ".storage/${name}"
            MOUNT_ARGS+=(-v "$(pwd)/.storage/${name}:/worker/${name}")
          done <<< "$STORAGE_BINDINGS"

          echo "Mount args: ${MOUNT_ARGS[*]}"

          docker run -d --name yaos-smoke \
            -p 8080:8080 \
            "${MOUNT_ARGS[@]}" \
            yaos-server:smoke-test

          echo "Waiting for worker to come up..."
          for i in $(seq 1 30); do
            # Check if container is still alive before trying curl
            if ! docker inspect yaos-smoke --format '{{.State.Running}}' | grep -q true; then
              echo "Container exited on attempt $i — showing logs:"
              docker logs yaos-smoke
              exit 1
            fi

            if curl -fsS http://localhost:8080/ -o /tmp/home.html 2>/dev/null; then
              echo "Worker responded on attempt $i"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "Worker never responded after 30 attempts"
              docker logs yaos-smoke
              exit 1
            fi
            sleep 1
          done

          echo "--- / response (first 20 lines) ---"
          head -20 /tmp/home.html

          echo "--- /api/capabilities ---"
          curl -fsS http://localhost:8080/api/capabilities | tee /tmp/capabilities.json
          echo

          # Fail loudly if the response isn't valid JSON (e.g. a crash page).
          node -e "JSON.parse(require('fs').readFileSync('/tmp/capabilities.json', 'utf8'))"

          echo "--- container logs ---"
          docker logs yaos-smoke

      - name: Tear down smoke test container
        if: always()
        run: docker rm -f yaos-smoke || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
